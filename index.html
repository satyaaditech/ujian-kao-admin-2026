<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Ujian Online - Admin Distributor KAO 2026</title>
    <link rel="stylesheet" href="css/styles.css">
    <style>
        .login-container {
            max-width: 480px;
            margin: 0 auto;
        }
        
        .token-input {
            font-family: 'Courier New', monospace;
            font-size: 1.3rem;
            text-align: center;
            letter-spacing: 2px;
            text-transform: uppercase;
        }
        
        .info-box {
            background: #f8f9fa;
            border-left: 4px solid #3498db;
            padding: 1rem;
            margin-top: 1.5rem;
            text-align: left;
            font-size: 0.9rem;
            color: #555;
        }
        
        .info-box strong {
            color: #333;
        }
        
        .form-note {
            font-size: 0.8rem;
            color: #666;
            margin-top: 0.25rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card login-container">
            <div class="header">
                <div class="logo">KAO</div>
                <h1>Sistem Ujian Online</h1>
                <p class="subtitle">Admin Distributor 2026</p>
            </div>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="tokenInput">Token Ujian</label>
                    <input 
                        type="text" 
                        id="tokenInput" 
                        class="form-control token-input" 
                        placeholder="KAO-2026-XXXX"
                        maxlength="15"
                        required
                        autocomplete="off"
                    >
                    <div class="form-note">Token diberikan oleh HRD.</div>
                </div>
                
                <div class="form-group">
                    <label for="namaInput">Nama Lengkap</label>
                    <input 
                        type="text" 
                        id="namaInput" 
                        class="form-control" 
                        placeholder="Masukkan nama lengkap Anda"
                        required
                        autocomplete="name"
                    >
                </div>
                
                <div class="form-group">
                    <label for="emailInput">Email</label>
                    <input 
                        type="email" 
                        id="emailInput" 
                        class="form-control" 
                        placeholder="contoh@email.com"
                        required
                        autocomplete="email"
                    >
                </div>
                
                <div id="errorMessage" class="alert alert-error" style="display: none;"></div>
                
                <button type="submit" class="btn btn-primary btn-block" id="submitBtn">
                    <span class="btn-text">Mulai Ujian</span>
                    <span class="btn-loading" style="display: none;">
                        <span class="spinner"></span> Memverifikasi...
                    </span>
                </button>
            </form>
            
            <div class="info-box">
                <strong>Catatan Penting:</strong>
                <ul style="margin: 0.5rem 0 0 0; padding-left: 1.2rem;">
                    <li>Token hanya bisa digunakan <strong>1 kali</strong></li>
                    <li>Pastikan data nama dan email benar</li>
                    <li>Waktu ujian: <strong>45 menit</strong></li>
                    <li>Setelah submit, Anda tidak bisa mengulang ujian</li>
                </ul>
            </div>
        </div>
        
        <footer class="footer">
            <p>&copy; 2026 KAO Indonesia. Hak Cipta Dilindungi.</p>
        </footer>
    </div>
    
    <script src="js/config.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Cek apakah sudah login, jika ya redirect ke halaman ujian
        if (isLoggedIn()) {
            const session = getSession();
            window.location.replace('exam.html?token=' + encodeURIComponent(session.token));
        }
        
        // Handle form submission
        document.getElementById('loginForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const tokenInput = document.getElementById('tokenInput');
            const namaInput = document.getElementById('namaInput');
            const emailInput = document.getElementById('emailInput');
            const submitBtn = document.getElementById('submitBtn');
            const errorMessage = document.getElementById('errorMessage');
            const btnText = submitBtn.querySelector('.btn-text');
            const btnLoading = submitBtn.querySelector('.btn-loading');
            
            // Ambil dan bersihkan input
            const token = tokenInput.value.trim().toUpperCase();
            const nama = namaInput.value.trim();
            const email = emailInput.value.trim().toLowerCase();
            
            // Validasi input client-side
            if (!token) {
                showError('Masukkan token ujian Anda');
                return;
            }
            
            if (!nama) {
                showError('Masukkan nama lengkap Anda');
                return;
            }
            
            if (!email) {
                showError('Masukkan email Anda');
                return;
            }
            
            // Validasi format email
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showError('Format email tidak valid');
                return;
            }
            
            // Tampilkan loading
            submitBtn.disabled = true;
            btnText.style.display = 'none';
            btnLoading.style.display = 'inline';
            hideError();
            
            // Validasi ke server
            console.log('Validating:', { token, nama, email });
            const result = await validateToken(token, nama, email);
            console.log('Validation result:', result);
            
            if (result.valid) {
                console.log('Token valid! Saving session...');
                
                // Simpan sesi
                saveSession(token, nama, email);
                
                // Redirect ke halaman ujian dengan token di URL sebagai fallback
                const examUrl = 'exam.html?token=' + encodeURIComponent(token);
                console.log('Redirecting to:', examUrl);
                
                setTimeout(function() {
                    window.location.replace(examUrl);
                }, 200);
            } else {
                // Tampilkan error
                showError(result.message);
                
                // Reset button
                submitBtn.disabled = false;
                btnText.style.display = 'inline';
                btnLoading.style.display = 'none';
            }
        });
        
        // Format token input (uppercase otomatis)
        document.getElementById('tokenInput').addEventListener('input', function(e) {
            e.target.value = e.target.value.toUpperCase();
        });
        
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
        }
        
        function hideError() {
            document.getElementById('errorMessage').style.display = 'none';
        }
    </script>
</body>
</html>
